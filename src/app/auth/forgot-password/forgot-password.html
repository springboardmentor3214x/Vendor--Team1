<div class="v-mesh-bg"></div>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-brand">
      <div class="auth-brand-mark">
        <span class="material-symbols-outlined">lock_reset</span>
      </div>
      <h1>Reset your password</h1>
      <p>We'll send a reset link to your email</p>
    </div>

    <div class="auth-card">

      <div *ngIf="!emailSent" class="auth-form">
        <div class="auth-field">
          <label class="auth-label">Email address</label>
          <input type="email" class="auth-input" placeholder="you@company.com" [(ngModel)]="email" autocomplete="email">
        </div>

        <button class="auth-submit" [disabled]="loading" (click)="sendResetLink()">
          <span class="material-symbols-outlined v-spinner" *ngIf="loading" style="font-size:18px;">progress_activity</span>
          {{ loading ? 'Sending…' : 'Send reset link' }}
        </button>
      </div>

      <div *ngIf="emailSent" style="background: var(--v-success-light); color: var(--v-success); padding: var(--v-4); border-radius: var(--v-radius-md); display: flex; align-items: center; gap: var(--v-2); font-weight: 500; font-size: 0.875rem;">
        <span class="material-symbols-outlined" style="font-size:20px;">check_circle</span>
        Reset link sent. Check your inbox.
      </div>

      <div class="auth-footer">
        Remember your password? <a routerLink="/login" class="auth-link">Back to sign in</a>
      </div>
    </div>

  </div>
</div>
