<div class="v-mesh-bg"></div>

<div class="auth-page">
  <div class="auth-box" style="max-width: 520px;">

    <div class="auth-brand">
      <div class="auth-brand-mark">
        <span class="material-symbols-outlined">deployed_code</span>
      </div>
      <h1>Create your account</h1>
      <p>Get started with the Vendor Reliability Platform</p>
    </div>

    <div class="auth-card">
      <form (ngSubmit)="register()" class="auth-form">

        <div class="auth-row">
          <div class="auth-field">
            <label class="auth-label">Full Name</label>
            <input type="text" class="auth-input" placeholder="Jane Doe" [(ngModel)]="user.fullName" name="fullName" required>
          </div>
          <div class="auth-field">
            <label class="auth-label">Role</label>
            <select class="auth-input" [(ngModel)]="user.role" name="role" required>
              <option value="Administrator">Administrator</option>
              <option value="Procurement Manager">Procurement Manager</option>
              <option value="Supply Chain Manager">Supply Chain Manager</option>
              <option value="Vendor">Vendor</option>
              <option value="Finance Officer">Finance Officer</option>
              <option value="Auditor">Auditor</option>
            </select>
          </div>
        </div>

        <div class="auth-row">
          <div class="auth-field" *ngIf="user.role !== 'Vendor'">
            <label class="auth-label">Employee ID</label>
            <input type="text" class="auth-input" placeholder="EMP-001" [(ngModel)]="user.employeeId" name="employeeId" required>
          </div>
          <div class="auth-field" *ngIf="user.role === 'Vendor'">
            <label class="auth-label">Company Name</label>
            <input type="text" class="auth-input" placeholder="Acme Corp" [(ngModel)]="user.companyName" name="companyName" required>
          </div>
          <div class="auth-field">
            <label class="auth-label">Mobile Number</label>
            <input type="text" class="auth-input" placeholder="10-digit number" [(ngModel)]="user.mobile" name="mobile" required>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label">Email Address</label>
          <input type="email" class="auth-input" placeholder="jane@company.com" [(ngModel)]="user.email" name="email" required>
        </div>

        <div class="auth-row">
          <div class="auth-field">
            <label class="auth-label">Password</label>
            <input type="password" class="auth-input" placeholder="Min 8 characters" [(ngModel)]="user.password" name="password" required>
          </div>
          <div class="auth-field">
            <label class="auth-label">Confirm Password</label>
            <input type="password" class="auth-input" placeholder="Repeat password" [(ngModel)]="user.confirmPassword" name="confirmPassword" required>
          </div>
        </div>

        <label class="auth-check">
          <input type="checkbox" name="acceptTerms" required>
          <span>I accept the <a href="javascript:void(0)" class="auth-link">Terms and Conditions</a></span>
        </label>

        <button type="submit" class="auth-submit" [disabled]="loading">
          <span class="material-symbols-outlined v-spinner" *ngIf="loading" style="font-size:18px;">progress_activity</span>
          {{ loading ? 'Creating account…' : 'Create account' }}
        </button>

      </form>

      <div class="auth-footer">
        Already have an account? <a routerLink="/login" class="auth-link">Sign in</a>
      </div>
    </div>

  </div>
</div>
