<div class="register-page">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="branding">

            <h1>VRIP</h1>

            <h2>
                Vendor Reliability
                <br>
                Intelligence Platform
            </h2>

            <p>
                Create a strong new password for your account. Make sure it is secure and easy for you to remember.
            </p>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div class="register-card">

            <h1>Reset Password</h1>

            <p>Create your new password</p>

            @if(!passwordReset){

                <div class="form-group">

                    <label>New Password</label>

                    <input
                        [type]="hidePassword ? 'password' : 'text'"
                        placeholder="Enter New Password"
                        [(ngModel)]="newPassword">

                </div>

                <div class="form-group" style="margin-top:20px;">

                    <label>Confirm Password</label>

                    <input
                        [type]="hideConfirmPassword ? 'password' : 'text'"
                        placeholder="Confirm Password"
                        [(ngModel)]="confirmPassword">

                </div>

                <button
                    class="register-btn"
                    (click)="resetPassword()"
                    [disabled]="loading">

                    @if(loading){

                        Saving...

                    } @else {

                        Save Password

                    }

                </button>

            } @else {

                <div
                    style="
                        background:#dcfce7;
                        color:#166534;
                        padding:20px;
                        border-radius:10px;
                        margin-top:20px;
                    ">

                    ✅ Password has been reset successfully.

                </div>

            }

            <p class="login-link">

                <a routerLink="/login">

                    Back to Login

                </a>

            </p>

        </div>

    </div>

</div>
