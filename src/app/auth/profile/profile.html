<div class="profile-page">

    <div class="profile-card">

        <div class="profile-header">

            <div class="profile-avatar">

                👤

            </div>

            <div>

                <h2>{{ user.fullName }}</h2>

                <p>{{ user.role }}</p>

            </div>

        </div>

        <div class="form-group">

            <label>Full Name</label>

            <input
                type="text"
                [(ngModel)]="user.fullName"
                [disabled]="!isEditing">

        </div>

        <div class="form-group">

            <label>Email Address</label>

            <input
                type="email"
                [(ngModel)]="user.email"
                [disabled]="!isEditing">

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <input
                type="text"
                [(ngModel)]="user.mobile"
                [disabled]="!isEditing">

        </div>

        <div class="form-group">

            <label>Role</label>

            <input
                type="text"
                [value]="user.role"
                disabled>

        </div>

        @if(!isEditing){

            <button
                class="primary-btn"
                (click)="editProfile()">

                Edit Profile

            </button>

        } @else {

            <button
                class="primary-btn"
                (click)="saveProfile()">

                Save Changes

            </button>

        }

        <button class="secondary-btn">

            Change Password

        </button>

    </div>

</div>
