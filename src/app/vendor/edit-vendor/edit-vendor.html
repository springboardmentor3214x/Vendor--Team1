<div class="form-container">

    <h1>Edit Vendor</h1>

    @if(vendor){

    <!-- Company Information -->

    <div class="form-section">

        <h2>🏢 Company Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>Company Name *</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.companyName">

            </div>

            <div class="form-group">

                <label>Vendor Category *</label>

                <select [(ngModel)]="vendor.category">

                    <option>Raw Material Suppliers</option>
                    <option>Equipment Vendors</option>
                    <option>IT Vendors</option>
                    <option>Service Providers</option>
                    <option>Logistics Partners</option>
                    <option>Maintenance Vendors</option>

                </select>

            </div>

            <div class="form-group">

                <label>Company Registration Number</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.companyRegistrationNumber">

            </div>

        </div>

    </div>

    <!-- Contact Information -->

    <div class="form-section">

        <h2>👤 Contact Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>Contact Person *</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.contactPerson">

            </div>

            <div class="form-group">

                <label>Designation</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.designation">

            </div>

            <div class="form-group">

                <label>Email Address *</label>

                <input
                    type="email"
                    [(ngModel)]="vendor.email">

            </div>

            <div class="form-group">

                <label>Phone Number *</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.phone">

            </div>

            <div class="form-group">

                <label>Alternate Phone</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.alternatePhone">

            </div>

        </div>

    </div>

    <!-- Tax Information -->

    <div class="form-section">

        <h2>🧾 Tax Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>GST Number *</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.gst">

            </div>

            <div class="form-group">

                <label>PAN Number *</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.pan">

            </div>

        </div>

    </div>

    <!-- Address Information -->

    <div class="form-section">

        <h2>📍 Address Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>Address Line 1</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.addressLine1">

            </div>

            <div class="form-group">

                <label>Address Line 2</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.addressLine2">

            </div>

            <div class="form-group">

                <label>City</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.city">

            </div>

            <div class="form-group">

                <label>State</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.state">

            </div>

            <div class="form-group">

                <label>Country</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.country">

            </div>

            <div class="form-group">

                <label>Pincode</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.pincode">

            </div>

        </div>

    </div>

    <!-- Business Information -->

    <div class="form-section">

        <h2>🌐 Business Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>Website</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.website">

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea
                    rows="5"
                    [(ngModel)]="vendor.description">
                </textarea>

            </div>

        </div>

    </div>

    <!-- Banking Information -->

    <div class="form-section">

        <h2>🏦 Banking Information</h2>

        <div class="form-grid">

            <div class="form-group">

                <label>Bank Account Number</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.bankAccountNumber">

            </div>

            <div class="form-group">

                <label>IFSC Code</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.ifscCode">

            </div>

            <div class="form-group">

                <label>Payment Terms</label>

                <input
                    type="text"
                    [(ngModel)]="vendor.paymentTerms">

            </div>

        </div>

    </div>

    <div class="form-actions">

        <button
            class="save-btn"
            (click)="updateVendor()">

            Update Vendor

        </button>

        <button
            class="cancel-btn"
            (click)="cancel()">

            Cancel

        </button>

    </div>

    } @else {

        <h2>Vendor not found.</h2>

    }

</div>
